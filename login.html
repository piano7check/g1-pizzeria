<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style-login.css">
    <title>Pizzeria - Login</title>
</head>
<body>
    <div class="login-box">
        <!-- Sección de Login -->
        <div id="login-section">
            <div class="login-header">
                <header>Mamma Mia</header>
            </div>
            <form id="login-form" method="post">
                <div class="input-box">
                    <input type="email" id="email" class="input-field" placeholder="Correo" autocomplete="off" required>
                </div>
                <div class="input-box">
                    <input type="password" id="password" class="input-field" placeholder="Contraseña" autocomplete="off" required>
                </div>
                <div class="input-submit">
                    <button type="submit" class="submit-btn" id="submit"></button>
                    <label for="submit">Iniciar sesión</label>
                </div>
            </form>
            <div class="sign-up-link">
                <p>¿No tienes una cuenta? <a href="#" id="show-register">Regístrate</a></p>
            </div>
        </div>

        <!-- Sección de Registro -->
        <div id="register-section" style="display: none;">
            <div class="login-header">
                <header>Mamma Mia</header>
            </div>
            <form id="register-form" method="post">
                <div class="input-box">
                    <input type="text" id="register-name" class="input-field" placeholder="Nombre" autocomplete="off" required>
                </div>
                <div class="input-box">
                    <input type="email" id="register-email" class="input-field" placeholder="Correo" autocomplete="off" required>
                </div>
                <div class="input-box">
                    <input type="password" id="register-password" class="input-field" placeholder="Contraseña" autocomplete="off" required>
                </div>
                <div class="input-submit">
                    <button type="submit" class="submit-btn" id="register-submit"></button>
                    <label for="register-submit">Registrarse</label>
                </div>
            </form>
            <div class="sign-up-link">
                <p>¿Ya tienes cuenta? <a href="#" id="show-login">Inicia sesión</a></p>
            </div>
        </div>
    </div>

    <!-- Modal para errores -->
    <div id="error-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span id="close-modal" class="close">×</span>
            <p id="modal-error-message"></p>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
